<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多链新合约监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    .header {
      background: #161b22;
      padding: 20px 30px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .header h1 { font-size: 24px; color: #58a6ff; }
    .wallet-btn {
      padding: 8px 16px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wallet-btn:hover { background: #2ea043; }
    .wallet-btn.connected { background: #1f6feb; }
    .wallet-address {
      font-family: monospace;
      font-size: 13px;
    }
    .stats {
      display: flex;
      gap: 20px;
    }
    .stat {
      text-align: center;
      padding: 10px 20px;
      background: #21262d;
      border-radius: 8px;
    }
    .stat-value { font-size: 24px; font-weight: bold; }
    .stat-label { font-size: 12px; color: #8b949e; }
    .eth { color: #627eea; }
    .sol { color: #14f195; }
    .bsc { color: #f3ba2f; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    .monitor-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .monitor-panel h3 {
      margin-bottom: 15px;
      color: #58a6ff;
    }
    .monitor-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .monitor-form input, .monitor-form select {
      padding: 10px 15px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      border-radius: 6px;
      font-size: 14px;
    }
    .monitor-form input {
      flex: 1;
      min-width: 300px;
    }
    .monitor-form select {
      min-width: 120px;
    }
    .monitor-form button {
      padding: 10px 20px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .monitor-form button:hover {
      background: #2ea043;
    }
    .monitor-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }
    .monitor-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #21262d;
      border-radius: 6px;
      font-size: 13px;
    }
    .monitor-item .addr {
      font-family: monospace;
      color: #58a6ff;
    }
    .monitor-item .remove {
      color: #f85149;
      cursor: pointer;
    }
    
    .tab-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      border-radius: 6px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #30363d;
      border-color: #58a6ff;
    }
    
    .filter-bar {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #30363d;
      border-color: #58a6ff;
    }
    .contract-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .contract-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      transition: all 0.2s;
    }
    .contract-card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }
    .contract-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .chain-badge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    .chain-ETH { background: rgba(98, 126, 234, 0.2); color: #627eea; }
    .chain-SOL { background: rgba(20, 241, 149, 0.2); color: #14f195; }
    .chain-BSC { background: rgba(243, 186, 47, 0.2); color: #f3ba2f; }
    .timestamp { color: #8b949e; font-size: 13px; }
    .contract-address {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 14px;
      color: #58a6ff;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .contract-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px;
      font-size: 13px;
    }
    .detail-item { color: #8b949e; }
    .detail-value { color: #e6edf3; margin-left: 4px; }
    .tx-link {
      color: #58a6ff;
      text-decoration: none;
    }
    .tx-link:hover { text-decoration: underline; }
    .empty {
      text-align: center;
      padding: 60px;
      color: #8b949e;
    }
    .last-update {
      text-align: center;
      padding: 10px;
      color: #8b949e;
      font-size: 12px;
    }
    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>🔗 多链新合约监控</h1>
    </div>
    <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">
      <span id="walletIcon">🔗</span>
      <span id="walletText">连接钱包</span>
    </button>
    <div class="stats">
      <div class="stat">
        <div class="stat-value eth" id="ethCount">0</div>
        <div class="stat-label">ETH</div>
      </div>
      <div class="stat">
        <div class="stat-value sol" id="solCount">0</div>
        <div class="stat-label">Solana</div>
      </div>
      <div class="stat">
        <div class="stat-value bsc" id="bscCount">0</div>
        <div class="stat-label">BSC</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">总计</div>
      </div>
    </div>
  </div>
  
  <div class="container">
    <div class="monitor-panel">
      <h3>🔍 合约监控</h3>
      <div class="monitor-form">
        <input type="text" id="contractInput" placeholder="输入合约地址 (0x...)">
        <select id="chainSelect">
          <option value="ETH">ETH</option>
          <option value="SOL">Solana</option>
          <option value="BSC">BSC</option>
        </select>
        <button onclick="addMonitor()">开始监控</button>
      </div>
      <div class="monitor-list" id="monitorList"></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="showTab('new')">新合约监控</button>
      <button class="tab-btn" onclick="showTab('track')">合约追踪</button>
      <button class="tab-btn" onclick="showTab('trade')">交易下单</button>
    </div>
    
    <div class="section active" id="section-new">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="ETH">ETH</button>
        <button class="filter-btn" data-filter="SOL">Solana</button>
        <button class="filter-btn" data-filter="BSC">BSC</button>
      </div>
      <div class="contract-list" id="contractList"></div>
    </div>
    
    <div class="section" id="section-track">
      <div class="contract-list" id="trackList">
        <div class="empty">暂无追踪中的合约</div>
      </div>
    </div>
    
    <div class="section" id="section-trade">
      <div class="monitor-panel">
        <h3>📈 交易下单</h3>
        <div class="monitor-form">
          <select id="tradeExchange">
            <option value="BINANCE">Binance</option>
            <option value="OKX">OKX</option>
            <option value="UNISWAP">Uniswap</option>
          </select>
          <input type="text" id="tradeSymbol" placeholder="交易对 (如 BTC/USDT)">
          <select id="tradeSide">
            <option value="BUY">买入</option>
            <option value="SELL">卖出</option>
          </select>
          <select id="tradeType">
            <option value="MARKET">市价</option>
            <option value="LIMIT">限价</option>
          </select>
          <input type="number" id="tradeAmount" placeholder="数量">
          <input type="number" id="tradePrice" placeholder="价格 (限价单)" style="display:none">
          <button onclick="createOrder()">下单</button>
        </div>
      </div>
      
      <div class="monitor-panel">
        <h3>💰 账户余额</h3>
        <div style="display:flex;gap:10px;margin-bottom:15px;">
          <select id="balanceExchange">
            <option value="BINANCE">Binance</option>
            <option value="OKX">OKX</option>
            <option value="UNISWAP">Uniswap</option>
          </select>
          <button class="filter-btn" onclick="loadBalance()">查询</button>
        </div>
        <div id="balanceList" class="contract-list"></div>
      </div>
      
      <div class="monitor-panel">
        <h3>📋 订单记录</h3>
        <div style="display:flex;gap:10px;margin-bottom:15px;">
          <select id="ordersExchange">
            <option value="BINANCE">Binance</option>
            <option value="OKX">OKX</option>
            <option value="UNISWAP">Uniswap</option>
          </select>
          <button class="filter-btn" onclick="loadOrders()">查询</button>
        </div>
        <div id="ordersList" class="contract-list"></div>
      </div>
    </div>
    
    <div class="last-update" id="lastUpdate">最后更新: --</div>
  </div>

  <script>
    let currentFilter = 'all';
    let contracts = [];
    let monitored = [];
    let walletAddress = null;
    let currentChain = 'ETH';

    const chainNames = { ETH: '以太坊', SOL: 'Solana', BSC: 'BSC' };
    const chainIds = { ETH: 1, BSC: 56 };

    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        alert('请安装 MetaMask 钱包');
        return;
      }
      
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        walletAddress = accounts[0];
        
        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        currentChain = Object.keys(chainIds).find(key => chainIds[key] === parseInt(chainId, 16)) || 'ETH';
        
        updateWalletUI();
        saveWalletToStorage();
      } catch (err) {
        console.error('Wallet connection error:', err);
        alert('连接钱包失败: ' + err.message);
      }
    }

    function updateWalletUI() {
      const btn = document.getElementById('walletBtn');
      const text = document.getElementById('walletText');
      const icon = document.getElementById('walletIcon');
      
      if (walletAddress) {
        btn.classList.add('connected');
        text.textContent = shortenAddress(walletAddress);
        icon.textContent = '✅';
        
        // Set chain select based on connected chain
        if (chainIds[currentChain]) {
          document.getElementById('chainSelect').value = currentChain;
        }
      } else {
        btn.classList.remove('connected');
        text.textContent = '连接钱包';
        icon.textContent = '🔗';
      }
    }

    function shortenAddress(addr) {
      if (!addr) return '';
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    function saveWalletToStorage() {
      localStorage.setItem('walletAddress', walletAddress || '');
    }

    function loadWalletFromStorage() {
      const saved = localStorage.getItem('walletAddress');
      if (saved && typeof window.ethereum !== 'undefined') {
        connectWallet();
      }
    }

    // Listen for account changes
    if (typeof window.ethereum !== 'undefined') {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length > 0) {
          walletAddress = accounts[0];
          updateWalletUI();
          saveWalletToStorage();
        } else {
          walletAddress = null;
          updateWalletUI();
          localStorage.setItem('walletAddress', '');
        }
      });
      
      window.ethereum.on('chainChanged', () => {
        window.location.reload();
      });
    }
    const chainLinks = {
      ETH: (addr, tx) => `https://etherscan.io/address/${addr}`,
      SOL: (addr, tx) => `https://solscan.io/tx/${tx}`,
      BSC: (addr, tx) => `https://bscscan.com/address/${addr}`
    };

    function formatTime(timestamp) {
      return new Date(timestamp * 1000).toLocaleString('zh-CN');
    }

    function renderContracts() {
      const filtered = currentFilter === 'all' 
        ? contracts 
        : contracts.filter(c => c.chain === currentFilter);
      
      const list = document.getElementById('contractList');
      
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">等待新合约监控数据...</div>';
        return;
      }

      list.innerHTML = filtered.map(c => `
        <div class="contract-card">
          <div class="contract-header">
            <span class="chain-badge chain-${c.chain}">${chainNames[c.chain]}</span>
            <span class="timestamp">${formatTime(c.timestamp)}</span>
          </div>
          <div class="contract-address">${c.address}</div>
          <div class="contract-details">
            <div class="detail-item">区块: <span class="detail-value">${c.blockNumber.toLocaleString()}</span></div>
            <div class="detail-item">部署者: <span class="detail-value">${shortenAddress(c.deployer)}</span></div>
            <div class="detail-item">交易: <a href="${chainLinks[c.chain](c.address, c.txHash)}" target="_blank" class="tx-link">${shortenAddress(c.txHash)}</a></div>
          </div>
        </div>
      `).join('');

      const counts = { ETH: 0, SOL: 0, BSC: 0 };
      contracts.forEach(c => counts[c.chain]++);
      document.getElementById('ethCount').textContent = counts.ETH;
      document.getElementById('solCount').textContent = counts.SOL;
      document.getElementById('bscCount').textContent = counts.BSC;
      document.getElementById('totalCount').textContent = contracts.length;
    }

    async function renderMonitorList() {
      try {
        const res = await fetch('/api/monitor');
        monitored = await res.json();
        
        const list = document.getElementById('monitorList');
        if (monitored.length === 0) {
          list.innerHTML = '';
          return;
        }
        
        list.innerHTML = monitored.map(m => `
          <div class="monitor-item">
            <span class="chain-badge chain-${m.chain}">${m.chain}</span>
            <span class="addr">${shortenAddress(m.address)}</span>
            <span class="remove" onclick="removeMonitor('${m.chain}', '${m.address}')">✕</span>
          </div>
        `).join('');
        
        loadTrackedContracts();
      } catch (e) {
        console.error('Error loading monitors:', e);
      }
    }

    async function loadTrackedContracts() {
      const list = document.getElementById('trackList');
      
      if (monitored.length === 0) {
        list.innerHTML = '<div class="empty">暂无追踪中的合约</div>';
        return;
      }

      let html = '';
      for (const m of monitored) {
        try {
          const res = await fetch(`/api/monitor/${m.chain}/${m.address}`);
          const data = await res.json();
          
          if (data.transactions && data.transactions.length > 0) {
            html += data.transactions.map(c => `
              <div class="contract-card">
                <div class="contract-header">
                  <span class="chain-badge chain-${c.chain}">${chainNames[c.chain]}</span>
                  <span class="timestamp">${formatTime(c.timestamp)}</span>
                </div>
                <div class="contract-address">${c.address}</div>
                <div class="contract-details">
                  <div class="detail-item">区块: <span class="detail-value">${c.blockNumber.toLocaleString()}</span></div>
                  <div class="detail-item">交易: <a href="${chainLinks[c.chain](c.address, c.txHash)}" target="_blank" class="tx-link">${shortenAddress(c.txHash)}</a></div>
                </div>
              </div>
            `).join('');
          } else {
            html += `
              <div class="contract-card">
                <div class="contract-header">
                  <span class="chain-badge chain-${m.chain}">${chainNames[m.chain]}</span>
                </div>
                <div class="contract-address">${m.address}</div>
                <div class="contract-details">
                  <div class="detail-item">状态: <span class="detail-value">监控中，暂无交易记录</span></div>
                </div>
              </div>
            `;
          }
        } catch (e) {
          console.error('Error loading contract:', e);
        }
      }
      
      list.innerHTML = html || '<div class="empty">暂无追踪中的合约</div>';
    }

    async function addMonitor() {
      const address = document.getElementById('contractInput').value.trim();
      const chain = document.getElementById('chainSelect').value;
      
      if (!address) {
        alert('请输入合约地址');
        return;
      }
      
      try {
        const res = await fetch('/api/monitor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, chain })
        });
        
        if (res.ok) {
          document.getElementById('contractInput').value = '';
          renderMonitorList();
        } else {
          const data = await res.json();
          alert(data.error || '添加失败');
        }
      } catch (e) {
        alert('添加失败: ' + e.message);
      }
    }

    async function removeMonitor(chain, address) {
      try {
        await fetch(`/api/monitor/${chain}/${address}`, { method: 'DELETE' });
        renderMonitorList();
      } catch (e) {
        alert('删除失败: ' + e.message);
      }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      
      if (tab === 'new') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('section-new').classList.add('active');
      } else if (tab === 'track') {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('section-track').classList.add('active');
        loadTrackedContracts();
      } else if (tab === 'trade') {
        document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
        document.getElementById('section-trade').classList.add('active');
      }
    }

    // Trading functions
    document.getElementById('tradeType').addEventListener('change', function() {
      document.getElementById('tradePrice').style.display = this.value === 'LIMIT' ? 'block' : 'none';
    });

    async function createOrder() {
      const exchange = document.getElementById('tradeExchange').value;
      const symbol = document.getElementById('tradeSymbol').value;
      const side = document.getElementById('tradeSide').value;
      const type = document.getElementById('tradeType').value;
      const amount = document.getElementById('tradeAmount').value;
      const price = document.getElementById('tradePrice').value;

      if (!symbol || !amount) {
        alert('请填写完整信息');
        return;
      }

      try {
        const res = await fetch('/api/trading/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ exchange, symbol, side, type, amount, price })
        });
        const data = await res.json();
        
        if (res.ok) {
          alert('下单成功！订单ID: ' + data.id);
          loadOrders();
        } else {
          alert('下单失败: ' + data.error);
        }
      } catch (e) {
        alert('下单失败: ' + e.message);
      }
    }

    async function loadBalance() {
      const exchange = document.getElementById('balanceExchange').value;
      const list = document.getElementById('balanceList');
      
      try {
        const res = await fetch(`/api/trading/balance/${exchange}`);
        const data = await res.json();
        
        if (res.ok) {
          list.innerHTML = data.map(b => `
            <div class="contract-card">
              <div class="contract-header">
                <span class="chain-badge chain-${exchange === 'UNISWAP' ? 'ETH' : exchange === 'BINANCE' ? 'ETH' : 'SOL'}">${b.asset}</span>
              </div>
              <div class="contract-details">
                <div class="detail-item">可用: <span class="detail-value">${b.free}</span></div>
                <div class="detail-item">冻结: <span class="detail-value">${b.locked}</span></div>
              </div>
            </div>
          `).join('');
        } else {
          list.innerHTML = '<div class="empty">' + (data.error || '获取失败') + '</div>';
        }
      } catch (e) {
        list.innerHTML = '<div class="empty">获取失败: ' + e.message + '</div>';
      }
    }

    async function loadOrders() {
      const exchange = document.getElementById('ordersExchange').value;
      const list = document.getElementById('ordersList');
      
      try {
        const res = await fetch(`/api/trading/orders/${exchange}`);
        const data = await res.json();
        
        if (res.ok) {
          if (data.length === 0) {
            list.innerHTML = '<div class="empty">暂无订单</div>';
            return;
          }
          
          list.innerHTML = data.map(o => `
            <div class="contract-card">
              <div class="contract-header">
                <span class="chain-badge chain-${o.side === 'BUY' ? 'ETH' : 'SOL'}">${o.side} ${o.type}</span>
                <span class="timestamp">${o.status}</span>
              </div>
              <div class="contract-address">${o.symbol}</div>
              <div class="contract-details">
                <div class="detail-item">数量: <span class="detail-value">${o.amount}</span></div>
                <div class="detail-item">成交: <span class="detail-value">${o.filledAmount}</span></div>
                <div class="detail-item">价格: <span class="detail-value">${o.price || '市价'}</span></div>
                <div class="detail-item">订单ID: <span class="detail-value">${o.orderId || o.id}</span></div>
              </div>
            </div>
          `).join('');
        } else {
          list.innerHTML = '<div class="empty">' + (data.error || '获取失败') + '</div>';
        }
      } catch (e) {
        list.innerHTML = '<div class="empty">获取失败: ' + e.message + '</div>';
      }
    }

    async function fetchData() {
      try {
        const res = await fetch('/api/contracts');
        const data = await res.json();
        contracts = data.contracts;
        renderContracts();
        document.getElementById('lastUpdate').textContent = `最后更新: ${new Date(data.lastUpdate).toLocaleTimeString()}`;
      } catch (e) {
        console.error('Fetch error:', e);
      }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderContracts();
      });
    });

    document.getElementById('contractInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addMonitor();
    });

    fetchData();
    renderMonitorList();
    loadWalletFromStorage();
    setInterval(fetchData, 3000);
    setInterval(renderMonitorList, 10000);
  </script>
</body>
</html>
