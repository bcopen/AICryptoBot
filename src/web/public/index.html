<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多链新合约监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    .header {
      background: #161b22;
      padding: 20px 30px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; color: #58a6ff; }
    .stats {
      display: flex;
      gap: 20px;
    }
    .stat {
      text-align: center;
      padding: 10px 20px;
      background: #21262d;
      border-radius: 8px;
    }
    .stat-value { font-size: 24px; font-weight: bold; }
    .stat-label { font-size: 12px; color: #8b949e; }
    .eth { color: #627eea; }
    .sol { color: #14f195; }
    .bsc { color: #f3ba2f; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .filter-bar {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #30363d;
      border-color: #58a6ff;
    }
    .contract-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .contract-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      transition: all 0.2s;
    }
    .contract-card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }
    .contract-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .chain-badge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    .chain-ETH { background: rgba(98, 126, 234, 0.2); color: #627eea; }
    .chain-SOL { background: rgba(20, 241, 149, 0.2); color: #14f195; }
    .chain-BSC { background: rgba(243, 186, 47, 0.2); color: #f3ba2f; }
    .timestamp { color: #8b949e; font-size: 13px; }
    .contract-address {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 14px;
      color: #58a6ff;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .contract-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px;
      font-size: 13px;
    }
    .detail-item { color: #8b949e; }
    .detail-value { color: #e6edf3; margin-left: 4px; }
    .tx-link {
      color: #58a6ff;
      text-decoration: none;
    }
    .tx-link:hover { text-decoration: underline; }
    .empty {
      text-align: center;
      padding: 60px;
      color: #8b949e;
    }
    .last-update {
      text-align: center;
      padding: 10px;
      color: #8b949e;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔗 多链新合约监控</h1>
    <div class="stats">
      <div class="stat">
        <div class="stat-value eth" id="ethCount">0</div>
        <div class="stat-label">ETH</div>
      </div>
      <div class="stat">
        <div class="stat-value sol" id="solCount">0</div>
        <div class="stat-label">Solana</div>
      </div>
      <div class="stat">
        <div class="stat-value bsc" id="bscCount">0</div>
        <div class="stat-label">BSC</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">总计</div>
      </div>
    </div>
  </div>
  
  <div class="container">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="ETH">ETH</button>
      <button class="filter-btn" data-filter="SOL">Solana</button>
      <button class="filter-btn" data-filter="BSC">BSC</button>
    </div>
    
    <div class="contract-list" id="contractList">
      <div class="empty">等待新合约监控数据...</div>
    </div>
    
    <div class="last-update" id="lastUpdate">最后更新: --</div>
  </div>

  <script>
    let currentFilter = 'all';
    let contracts = [];

    const chainNames = { ETH: '以太坊', SOL: 'Solana', BSC: 'BSC' };
    const chainColors = { ETH: 'eth', SOL: 'sol', bsc: 'bsc' };

    const chainLinks = {
      ETH: (addr, tx) => `https://etherscan.io/address/${addr}`,
      SOL: (addr, tx) => `https://solscan.io/tx/${tx}`,
      BSC: (addr, tx) => `https://bscscan.com/address/${addr}`
    };

    function formatTime(timestamp) {
      return new Date(timestamp * 1000).toLocaleString('zh-CN');
    }

    function shortenAddress(addr) {
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    function renderContracts() {
      const filtered = currentFilter === 'all' 
        ? contracts 
        : contracts.filter(c => c.chain === currentFilter);
      
      const list = document.getElementById('contractList');
      
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">暂无监控数据</div>';
        return;
      }

      list.innerHTML = filtered.map(c => `
        <div class="contract-card">
          <div class="contract-header">
            <span class="chain-badge chain-${c.chain}">${chainNames[c.chain]}</span>
            <span class="timestamp">${formatTime(c.timestamp)}</span>
          </div>
          <div class="contract-address">${c.address}</div>
          <div class="contract-details">
            <div class="detail-item">区块: <span class="detail-value">${c.blockNumber.toLocaleString()}</span></div>
            <div class="detail-item">部署者: <span class="detail-value">${shortenAddress(c.deployer)}</span></div>
            <div class="detail-item">交易: <a href="${chainLinks[c.chain](c.address, c.txHash)}" target="_blank" class="tx-link">${shortenAddress(c.txHash)}</a></div>
          </div>
        </div>
      `).join('');

      // Update counts
      const counts = { ETH: 0, SOL: 0, BSC: 0 };
      contracts.forEach(c => counts[c.chain]++);
      document.getElementById('ethCount').textContent = counts.ETH;
      document.getElementById('solCount').textContent = counts.SOL;
      document.getElementById('bscCount').textContent = counts.BSC;
      document.getElementById('totalCount').textContent = contracts.length;
    }

    async function fetchData() {
      try {
        const res = await fetch('/api/contracts');
        const data = await res.json();
        contracts = data.contracts;
        renderContracts();
        document.getElementById('lastUpdate').textContent = `最后更新: ${new Date(data.lastUpdate).toLocaleTimeString()}`;
      } catch (e) {
        console.error('Fetch error:', e);
      }
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderContracts();
      });
    });

    // Auto refresh
    fetchData();
    setInterval(fetchData, 3000);
  </script>
</body>
</html>
